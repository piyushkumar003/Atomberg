services:
  - type: web
    name: goal-portal-api
    env: docker
    plan: free
    region: oregon
    buildCommand: null
    startCommand: null # Handled by Dockerfile CMD ["npm", "run", "deploy:prod"]
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goal-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

databases:
  - name: goal-portal-db
    plan: free
    region: oregon
