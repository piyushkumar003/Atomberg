version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: goal_portal_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goal_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: goal_portal_server
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/goal_portal?schema=public"
      JWT_SECRET: "enterprise_super_secret_key_123!"
      JWT_REFRESH_SECRET: "enterprise_super_secret_refresh_key_456!"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db

  client:
    build: ./client
    container_name: goal_portal_client
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
